server:
  port: 20000

spring:
  application:
    name: ai-gateway
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 3000

aimams:
  intent:
    rules:
      - intent: query_order
        keywords: ["订单", "查订单", "查询订单", "我的订单", "最近订单"]
        channel: direct_mcp
        priority: 1
      - intent: query_user
        keywords: ["查用户", "用户信息", "查一下", "查询用户"]
        channel: direct_mcp
        priority: 1
      - intent: send_message
        keywords: ["发送", "通知", "发给", "发消息", "推送"]
        channel: dify
        priority: 1
      - intent: help
        keywords: ["帮助", "功能", "你能做什么", "可以做什么", "怎么用"]
        channel: ai_direct
        priority: 10
      - intent: greeting
        keywords: ["你好", "您好", "hi", "hello", "早上好", "下午好", "晚上好"]
        channel: ai_direct
        priority: 10

logging:
  level:
    com.asialjim.microapplet.mams.aigateway: DEBUG
